name: Auto Generate Article & Deploy

on:
  schedule:
    # 月・水・金 朝9時 JST (= UTC 0:00)
    - cron: '0 0 * * 1,3,5'
  workflow_dispatch:

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-article.js

      - name: Build site
        run: node scripts/build.js

      - name: Commit generated content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/ public/
          if git diff --staged --quiet; then
            echo "No changes to commit (all themes may be generated)"
          else
            git commit -m "auto: 記事自動生成 $(date +'%Y-%m-%d')"
            git push
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: fitlab-fukuoka
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
